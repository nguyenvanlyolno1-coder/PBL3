<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hệ thống Giám sát Thi DUT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 380px;
        }
        .login-box h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 22px;
        }
        .login-box p.subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-login:hover { background: #2471a3; }
        .alert {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }
        .alert-error { background: #fdecea; color: #c0392b; border: 1px solid #e74c3c; }
        .alert-success { background: #eafaf1; color: #27ae60; border: 1px solid #2ecc71; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🎓 HỆ THỐNG GIÁM SÁT THI</h2>
    <p class="subtitle">Đại học Bách khoa Đà Nẵng</p>

    <!-- Thông báo lỗi -->
    <div th:if="${param.error}" class="alert alert-error">
        ❌ Sai tên đăng nhập hoặc mật khẩu!
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        ✅ Đăng xuất thành công!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" placeholder="Nhập username..." required autofocus/>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu..." required/>
        </div>
        <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
    </form>
</div>
</body>
</html>
